name: Deploy Backend

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "Starting deployment..."

            cd /var/www/routeup/backend

            git fetch origin
            git reset --hard origin/main
            git clean -fd

            npm install

            # Fix HTTP 413: raise nginx upload limit (many required study/PR documents)
            if command -v nginx >/dev/null 2>&1; then
              echo "Updating nginx client_max_body_size to 100m..."
              echo 'client_max_body_size 100m;' | sudo tee /etc/nginx/conf.d/routeup-upload-limit.conf >/dev/null
              for conf in /etc/nginx/sites-available/* /etc/nginx/sites-enabled/*; do
                if [ -f "$conf" ] && grep -q "client_max_body_size" "$conf" 2>/dev/null; then
                  sudo sed -i 's/client_max_body_size[[:space:]]*[0-9]\+[kKmMgG]\?;/client_max_body_size 100m;/g' "$conf" || true
                fi
              done
              # If api site has no body size directive yet, inject into server blocks for api.routeup.co.in
              for conf in /etc/nginx/sites-available/* /etc/nginx/sites-enabled/*; do
                if [ -f "$conf" ] && grep -qi "api.routeup" "$conf" 2>/dev/null && ! grep -q "client_max_body_size" "$conf" 2>/dev/null; then
                  sudo sed -i '/server_name/a\    client_max_body_size 100m;' "$conf" || true
                fi
              done
              if sudo nginx -t; then
                sudo systemctl reload nginx || sudo service nginx reload || true
                echo "nginx reload OK"
              else
                echo "nginx config test failed - skipping reload"
              fi
            fi

            pm2 restart routeup-backend || pm2 start npm --name routeup-backend -- start

            pm2 save

            echo "Backend deployed successfully at $(date)"
